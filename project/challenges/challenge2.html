<!DOCTYPE html>
<html>
    <head>
      <style>
        .heading{
            font-family:arial;
            font-size:30px;
            margin-top:0px;
        }
        .pickup{
            padding-top:8px;
            padding-bottom:8px;
            padding-left:10px;
            padding-right:150px;
            border:none;
            background-color:rgb(255, 245, 245);
            margin-bottom:opx;
        }
        .destination{
            Display:block;
            margin-top:8px;
             padding-top:8px;
            padding-bottom:8px;
            padding-left:10px;
            padding-right:150px;
             background-color:rgb(255, 245, 245);
             border:none;
             margin-bottom:0px;
        }
        .request{
            margin-top:20px;
            border:none;
            background-color:black;
            color:white;
              padding-top:8px;
            padding-bottom:8px;
            padding-left:15px;
            padding-right:15px;
             transition: 0.15s;
            cursor:pointer;
            
        }
        .size{

            font-size:12px;
        }
         .request:hover{
            opacity:0.6;
        }
        .request:active{
            opacity:0.4;
        }
         .schedule{
            margin-left:10px;
              margin-top:20px;
            border:none;
             background-color:rgb(255, 245, 245);
             padding-top:8px;
            padding-bottom:8px;
            padding-left:15px;
            padding-right:15px;
            transition: 0.15s;
            cursor:pointer;
            
        }
        .schedule:hover{
            background-color:rgb(211, 195, 195);
        }
        .schedule:active{
            
             opacity:0.4;
        }
        .first{
            Display:block;
            margin-top:100px;
            margin-bottom:0px;
            padding-top:12px;
            padding-bottom:12px;
            border-radius:10px;
            padding-left:15px;
            padding-right:0px;

        }
        .last{
          display:inline-block;
            margin-top:0px;
            margin-left:200px;
           
        }
      </style>   
       
       
    </head>
    <body>
        <div>
             <p class="heading">
            Request a ride now
        </p>
        <input class="pickup" placeholder="Enter pickup location">
        <input class="destination" placeholder="Enter destination">
        <button class="request">
            <span class="size">Request now</span>
        </button>
        <button class="schedule">
            Schedule for later
        </button>
        <input class="first"placeholder="First name">
        <input class="last" placeholder="Last name">
        </div>
       

    </body>
</html>
