<!DOCTYPE html>
<html>
    <head>
        <style>
            .image1 , .image2{
                width:150px;
                height: 150px;
                object-fit:cover;
                display:block;
            }
            .cat-name , .cat-name2{
                display:block;
                font-family:arial;
                font-weight:700;
                margin-left:5px;
                
            }
            .cat-mutuals , .cat-mutuals2{
                display:block;
                 font-family:arial;
                   margin-left:5px;
                   color:rgb(148, 136, 136);
                   font-size:14px;

            }
            .friend-request,.friend-request2{
                background-color:rgb(97, 97, 253);
                color:white;
                border:none;
                padding-right:10px;
                padding-top:5px;
                padding-bottom:5px;
                margin-left:5px;
            }
            .profile, .profile2 {
                display:inline-block;
                width:150px;
                border-style:ridge;
                
            }
            
        </style>
    </head>
    <body>
        <div class="profile">
             <img class="image1" src="download.jpg">  
      <p class="cat-name">
        Oliver
      </p>
      <p class="cat-mutuals">
        2 mutual friends
      </p>
      <button class="friend-request">
        Add Friend
      </button>
        </div>
         <div class="profile2">
             <img class="image2" src="download2.jpg">  
      <p class="cat-name2">
        Mimi
      </p>
      <p class="cat-mutuals2">
        3 mutual friends
      </p>
      <button class="friend-request2">
        Add Friend
      </button>
        </div>
     
    </body>
</html>
