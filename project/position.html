<!DOCTYPE html>
<html>
    <head>
        <title>
            css position practice
        </title>
    </head>
    <body style="padding-bottom:500px;
    padding-top:60px;
    padding-left:80px;">
        <div style="background-color:black;
        color:white;
        position:fixed;
        top:0px;
        height:50px;
        left:0px;
        right:0px;
        z-index:100;">
            header
        </div>
        <div style="background-color:green;
        color:white;
        position:fixed;
        left:0px;
        bottom:0px;
        top:50px;
        width:72px;">
            sidebar
             <div style="background-color:rgb(185, 14, 14);
            color:white;
            position:absolute;
            top:0px;
            right:0px;
        ">
            x
       </div>

        </div>
        <div style="background-color:rgb(185, 14, 14);
            color:white;
            position:absolute;
            top:60px;
            right:10px;
        ">
            Absolute
       </div>
        <div style="background-color:lightblue;
        height:200px;
        width:200px;
        ">
            div1
        </div>
        <div style="background-color:lightpink;
          height:200px;
        width:200px; 
        position:relative;">
            div2
             <div style="background-color:rgb(185, 14, 14);
            color:white;
            position:absolute;
          
            right:10px;
            bottom:10px;
        ">
            15:06
       </div>

        </div>
    </body>
</html>
