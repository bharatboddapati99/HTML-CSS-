<!DOCTYPE html>
<html>
    <head>
        <title>flex box</title>
    </head>
    <body style="padding-bottom:1000px;">
     <div style="display:flex;
             ">
        <div style="background-color:lightblue;">
            Div1 
        </div>  
        <div style="background-color:lightpink;">
            Div2
        </div>
     </div>


     <div style="display:flex;
              
                margin-top:40px;">
        <div style="background-color:lightblue;
        width:100px;">
            100px
        </div>  
        <div style="background-color:lightpink;
        flex:1">
            flex1
        </div>
     </div>


     <div style="display:flex;
               
                margin-top:40px;">
        <div style="background-color:lightblue;
        width:100px;">
            100px
        </div>  
        <div style="background-color:lightpink;
        flex:1">
            flex1
        </div>
         <div style="background-color:lightblue;
        flex:2;">
          flex2
     </div>
     </div>

      <div style="display:flex;
                
                margin-top:40px;
                height:70px;
                border-width:1px;
                border-color:grey;
                border-style:solid;
               justify-content:center; ">
        <div style="background-color:lightblue;
        width:100px;">
            100px
        </div>  
        <div style="background-color:lightpink;
       width:100px">
           100px
        </div>
         <div style="background-color:lightblue;
       width: 100px;">
         100px
        </div>

    </div>



     <div style="display:flex;
               
                margin-top:40px;
                height:70px;
                border-width:1px;
                border-color:grey;
                border-style:solid;
               justify-content:space-between; ">
        <div style="background-color:lightblue;
        width:100px;">
            100px
        </div>  
        <div style="background-color:lightpink;
       width:100px">
           100px
        </div>
         <div style="background-color:lightblue;
       width: 100px;">
         100px
        </div>

    </div>



     <div style="display:flex;  
                margin-top:40px;
                height:70px;
                border-width:1px;
                border-color:grey;
                border-style:solid;
               justify-content:space-between;
               align-items:center;">
        <div style="background-color:lightblue;
        width:100px;">
            100px
        </div>  
        <div style="background-color:lightpink;
       width:100px">
           100px
        </div>
         <div style="background-color:lightblue;
       width: 100px;">
         100px
        </div>

    </div>
    </body>
</html>
