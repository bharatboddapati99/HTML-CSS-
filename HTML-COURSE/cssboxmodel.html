<button class="subscribe-button">
    SUBSCRIBE
</button>
<style>
    .subscribe-button{
        background-color:rgb(209, 0, 0);
        color:white;
        border:none;
        border-radius:2px;
        cursor:pointer;
        margin-right:10px;
        transition: opacity  0.15s;
        padding-left:20px;
        padding-right:20px;
        padding-top:10px;
        padding-bottom:10px;
        vertical-align: top;
    }
    .subscribe-button:hover{
       opacity:0.8;
        
    }
    .subscribe-button:active{
       opacity:0.3;
    }
</style>



<button class="join-button">
    JOIN 
</button>
<style>
    .join-button{
        background-color:white;
        border-color:rgb(56, 56, 251);
        color:rgb(56, 56, 251);
        border-style:solid;
        height:35px;
        width:70px;
        border-radius:2px;
        border-width:1px;
        margin-right:10px;
        cursor:pointer;
        transition: background-color 0.15s,color 0.15s;
        
    }
    .join-button:hover{
        background-color:rgb(56, 56, 251);
        color:white;

    }
    .join-button:active{
        opacity:0.8;
    }
</style>


<button class="tweet-button">
    Tweet
</button>
<style>
    .tweet-button{
        background-color:rgba(2, 120, 254, 0.983);
        color:white;
        border:none;
        height:33px;
        border-radius:20px;
        width:80px;
        font-weight:bold;
        font-size:15px;
        cursor:pointer;
        transition:box-shadow 0.15s;
        vertical-align: top;
        
    }
    .tweet-button:hover{
       box-shadow: 0px 5px 5px rgba(0,0,0,0.3);
    }
    .tweet-button:active{
        opacity:0.8;
    }
</style>
